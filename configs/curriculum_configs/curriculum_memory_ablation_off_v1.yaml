curriculum_id: curriculum_memory_ablation_off_v1
default_stage_index: 0
stages:
  - stage_id: ablation_stage1_openarena_fixed
    scene: 01_Baseline_OpenArena_3v2
    rule_config: configs/env_configs/asymmetry_config_memory_off.yaml
    maze:
      enabled: false
      mode: open
      seed: 42
      randomize_spawns: false
      randomize_exits: false
    dynamic_walls:
      enabled: false
      shift_interval_seconds: 0.0
      shift_intensity: 0
      safe_buffer: 1.5
      allow_exit_blocking: false
      wall_lowered_offset: 3.0
    completion_criteria:
      min_episodes: 1200
      sentinel_win_rate_threshold: 0.55
  - stage_id: ablation_stage2_static_random
    scene: 02_StaticMaze_3v2
    rule_config: configs/env_configs/maze_static_config_memory_off.yaml
    maze:
      enabled: true
      mode: static
      seed: 42
      randomize_spawns: true
      randomize_exits: true
    dynamic_walls:
      enabled: false
      shift_interval_seconds: 0.0
      shift_intensity: 0
      safe_buffer: 1.5
      allow_exit_blocking: false
      wall_lowered_offset: 3.0
    completion_criteria:
      min_episodes: 2200
      sentinel_win_rate_threshold: 0.50
  - stage_id: ablation_stage3_dynamic_low
    scene: 03_DynamicMaze_3v2
    rule_config: configs/env_configs/maze_dynamic_config_memory_off.yaml
    maze:
      enabled: true
      mode: dynamic
      seed: 42
      randomize_spawns: true
      randomize_exits: true
    dynamic_walls:
      enabled: true
      shift_interval_seconds: 20.0
      shift_intensity: 1
      safe_buffer: 1.75
      allow_exit_blocking: false
      wall_lowered_offset: 3.0
    completion_criteria:
      min_episodes: 3200
      sentinel_win_rate_threshold: 0.48
  - stage_id: ablation_stage4_dynamic_high
    scene: 03_DynamicMaze_3v2
    rule_config: configs/env_configs/maze_dynamic_config_memory_off.yaml
    maze:
      enabled: true
      mode: dynamic
      seed: 84
      randomize_spawns: true
      randomize_exits: true
    dynamic_walls:
      enabled: true
      shift_interval_seconds: 8.0
      shift_intensity: 3
      safe_buffer: 1.25
      allow_exit_blocking: false
      wall_lowered_offset: 3.0
    completion_criteria:
      min_episodes: 3000
      sentinel_win_rate_threshold: 0.45
