# Labyrinth Breach - Open Arena 3v2 PPO baseline.
#
# Unity behavior names expected in the scene/prefabs:
# - Sentinel: shared by the 3 pursuer agents.
# - Runner: shared by the 2 evader agents.
#
# Environment target:
# - Scene: 01_Baseline_OpenArena_3v2
# - Agents: 3 Sentinels vs 2 Runners
# - Maze: disabled/open arena
# - Reward config: reward_shared_basic_v1
#
# Keep only ML-Agents trainer keys below this point. Project-specific
# metadata is documented in comments so mlagents-learn can parse this file.
behaviors:
  Sentinel:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 500000
    time_horizon: 64
    summary_freq: 10000
  Runner:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024
      buffer_size: 10240
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: false
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 500000
    time_horizon: 64
    summary_freq: 10000
