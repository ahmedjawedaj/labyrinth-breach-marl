# Labyrinth Breach - Static Maze 3v2 PPO baseline.
#
# Unity behavior names expected in the scene/prefabs:
# - Sentinel: shared by the 3 pursuer agents.
# - Runner: shared by the 2 evader agents.
#
# Environment target:
# - Scene: 02_StaticMaze_3v2
# - Agents: 3 Sentinels vs 2 Runners
# - Maze: static seeded layout with corridors, walls, spawn-safe zones, and exit zones
# - Rule config: configs/env_configs/maze_static_config.yaml
# - Reward config: reward_shared_basic_v1
#
# Static maze uses normalized observations and a larger rollout horizon than
# Open Arena because rays, exit vectors, walls, and memory are enabled.
# Keep only ML-Agents trainer keys below this point. Project-specific
# metadata is documented in comments so mlagents-learn can parse this file.
behaviors:
  Sentinel:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1000000
    time_horizon: 128
    summary_freq: 10000
  Runner:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2048
      buffer_size: 20480
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 2
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 1000000
    time_horizon: 128
    summary_freq: 10000
