# Labyrinth Breach - Optional Dynamic Maze 3v2 MA-POCA config.
#
# Purpose:
# - Alternative multi-agent partial-observability experiment path.
# - Does not replace the PPO baseline configs.
# - Intended for comparison against ppo_dynamicmaze_3v2.yaml.
#
# Unity behavior names expected in the scene/prefabs:
# - Sentinel: shared by the 3 pursuer agents.
# - Runner: shared by the 2 evader agents.
#
# Environment target:
# - Scene: 03_DynamicMaze_3v2
# - Agents: 3 Sentinels vs 2 Runners
# - Maze: dynamic wall shifts, exit zones, rays, memory, and entity observations
# - Rule config: configs/env_configs/maze_dynamic_config.yaml
# - Reward configs: reward_shared_basic_v1 or reward_trap_aware_v3
#
# Notes:
# - This config is intentionally separate from PPO so PPO training remains the
#   primary reproducible path.
# - MA-POCA is useful once group coordination rewards and team-level metrics are
#   stable enough for comparison.
# - Keep only ML-Agents trainer keys below this point. Project-specific
#   metadata is documented in comments so mlagents-learn can parse this file.
behaviors:
  Sentinel:
    trainer_type: poca
    hyperparameters:
      batch_size: 2048
      buffer_size: 40960
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 2000000
    time_horizon: 128
    summary_freq: 20000
  Runner:
    trainer_type: poca
    hyperparameters:
      batch_size: 2048
      buffer_size: 40960
      learning_rate: 3.0e-4
      beta: 5.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 3
    reward_signals:
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 2000000
    time_horizon: 128
    summary_freq: 20000
